# bulk-merge control pane (TOML)
#
# Default values are set for the provided `tmp/docker-compose.yaml` Postgres instance.

# Base directory for cacheable artifacts and temp outputs.
[paths]
cache_dir = ".cache/bulk-merge"
cache_policy = "prefer" # "always" | "prefer" | "never"

[postgres]
# For the docker-compose in `tmp/docker-compose.yaml`, the port is published to the host,
# so `127.0.0.1:5432` is correct when running the CLI on the host.
host = "127.0.0.1"
port = 5432
user = "admin"
password = "admin"
database = "data"
# statement_timeout_ms = 30_000

# Optional: set a full URL instead of host/port/user/password/database.
# url = "postgresql://admin:admin@127.0.0.1:5432/data"

# These schemas are created by `bulk-merge init-db`.
schema_meta = "bm_meta"
schema_libgen = "src_libgen"
# Optional prefix applied to provisioned tables (in addition to per-kind prefixes).
# table_prefix = "lg_"

[postgres.pool]
max_connections = 10
min_connections = 0
acquire_timeout_ms = 30_000

[logging]
level = "info"
format = "human" # "human" | "json"
include_target = false
include_location = false

[execution]
dry_run_default = false
concurrency = 2
memory_hard_limit_bytes = 536_870_912

[execution.loader]
kind = "copy" # "copy" | "insert"

[execution.copy]
# When loading intermediate TSV files, stream bytes to Postgres COPY in chunks of this size.
file_send_chunk_bytes = 1_048_576

[execution.batch]
max_rows = 25_000
max_bytes = 64_000_000

[execution.retry]
max_attempts = 3
backoff_ms_initial = 250
backoff_ms_max = 5_000

[progress]
log_interval_seconds = 30

[output]
format = "human" # "human" | "json"
color = "auto"   # "auto" | "always" | "never"
# report_path = "tmp/bulk-merge-report.jsonl"

[libgen.dump]
kind = "fiction" # "fiction" | "compact"
path = ""
dataset_id = ""
allow_invalid_utf8 = false
max_statement_bytes = 16_000_000
error_preview_bytes = 256

[libgen.tables]
fiction_prefix = "fiction_"
compact_prefix = "compact_"

[libgen.offline]
# If omitted, defaults to `${paths.cache_dir}/libgen-offline` unless `paths.cache_policy="never"`.
# out_dir_default = ".cache/bulk-merge/libgen-offline"
layout = "kind_subdir" # "kind_subdir" | "flat"

[libgen.offline.load]
strategy = "staging_swap"
staging_schema_prefix = "src_libgen_staging"
keep_old_tables = true
drop_old_tables_on_success = false

[libgen.resume]
enabled = true
checkpoint_granularity = "statement" # "statement" | "row"

[libgen.incremental]
strategy = "primary_key" # "primary_key" | "row_hash"
apply_deletes = false
primary_key_columns = { fiction = ["ID"], compact = ["ID"] }
row_hash = { enabled = false, algorithm = "sha256" }

[libgen.raw]
enabled = true
store_other_statements = true

[postgres.indexing]
create_after_load = true
concurrent = false
main_fields = { fiction = ["Title", "Author", "ISBN", "MD5"], compact = ["Title", "Author", "ISBN", "MD5"] }
